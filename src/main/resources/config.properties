# Fallback configuration ? values here are overridden by env vars.
# See .env.example for the full list of supported variables.

# Application URLs
base.url=https://mobalytics.gg
api.base.url=https://account.mobalytics.gg

# Browser
browser=chrome
headless=true

# Timeouts (milliseconds)
timeout.default=15000
timeout.navigation=30000
timeout.api=10000

# Retry & parallelism
retry.count=1
parallel.threads=4

# Viewport
viewport.width=1920
viewport.height=1080

# Allure
allure.results.dir=target/allure-results
allure.report.dir=target/allure-report

# Screenshot behaviour
screenshot.on.failure=true

