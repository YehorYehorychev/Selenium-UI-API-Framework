# ?????????????????????????????????????????????????????????????????
# SLF4J SimpleLogger configuration
# Controls console log output for the test framework.
# Analogue of the LOG_LEVEL / ANSI setup in logger.ts
# ?????????????????????????????????????????????????????????????????

# Default log level: trace | debug | info | warn | error
# Override at runtime: -Dorg.slf4j.simpleLogger.defaultLogLevel=debug
org.slf4j.simpleLogger.defaultLogLevel=info

# Per-class overrides (uncomment to increase verbosity for specific classes)
# org.slf4j.simpleLogger.log.com.yehorychev.selenium.pages=debug
# org.slf4j.simpleLogger.log.com.yehorychev.selenium.helpers=debug

# Show timestamp in [yyyy-MM-dd HH:mm:ss] format
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd HH:mm:ss.SSS

# Show the short logger name (class name only, not full package)
org.slf4j.simpleLogger.showShortLogName=true

# Show the log level label
org.slf4j.simpleLogger.levelInBrackets=true

# Output to System.out (so it appears alongside test output in CI)
org.slf4j.simpleLogger.logFile=System.out

